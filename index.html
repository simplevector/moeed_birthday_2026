<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Moeed Turns 20</title>
    <link href="https://fonts.googleapis.com/css2?family=Anton&family=Caveat&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.0/p5.js"></script>
    <style>
        :root {
            --bg-color: #e6dfd0;
            --accent-red: #ba0a0a;
            --header-font: 'Anton', sans-serif;
            --script-font: 'Caveat', cursive;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body { background-color: var(--bg-color); -webkit-overflow-scrolling: touch; }

        .main-container {
            height: 100vh;
            overflow-y: scroll;
            scroll-snap-type: y mandatory;
            scroll-behavior: smooth;
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
        .main-container::-webkit-scrollbar { display: none; }

        section {
            height: 100vh;
            width: 100%;
            scroll-snap-align: start;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            background-color: var(--bg-color);
        }

        /* Canvas parented inside chai-section; overflow:hidden on section clips it there only */
        #smoke-canvas {
            position: absolute;
            top: 0;
            left: 0;
            z-index: 0;
            pointer-events: none;
        }

        .content-layer {
            z-index: 10;
            text-align: center;
            pointer-events: none;
            user-select: none;
            position: absolute;
            top: 35%;
            left: 50%;
            transform: translateX(-50%);
            width: 90%;
        }

        h1 {
            font-family: var(--header-font);
            font-size: 10vw;
            color: var(--accent-red);
            text-transform: uppercase;
            line-height: 0.9;
            letter-spacing: 2px;
        }

        .subtitle {
            font-family: var(--script-font);
            font-size: 4vw;
            color: var(--accent-red);
            margin-top: 15px;
        }

        .section-image {
            position: absolute;
            bottom: 0;
            z-index: 1;
            width: auto;
        }

        #lighter-img {
            left: 2%;
            max-height: 60vh;
        }

        @keyframes floatAndRotate {
            0%, 100% { transform: translate(0px, 0px) rotate(0deg); }
            25% { transform: translate(5px, 5px) rotate(90deg); }
            50% { transform: translate(0px, -5px) rotate(180deg); }
            75% { transform: translate(-5px, 5px) rotate(270deg); }
            100% { transform: translate(0px, 0px) rotate(360deg); }
        }

        #cup-img {
            right: 3%;
            max-height: 45vh;
            z-index: 5;
            top: 3%;
            animation: floatAndRotate 10s linear infinite;
            transform-origin: center;
        }

        @media (max-width: 768px) {
            h1 { font-size: 18vw; }
            .subtitle { font-size: 8vw; }
            #lighter-img { max-height: 40vh; left: -10%; }
            #cup-img { max-height: 50vh; right: -10%; animation: none; }
        }
    </style>
</head>
<body>

<div class="main-container">

    <section id="chai-section">
        <div class="content-layer">
            <h1>CHAI.CHACHA.CHILL</h1>
            <p class="subtitle">moeed turns 20</p>
        </div>
        <img src="assets/lighter.png" alt="Lighter" id="lighter-img" class="section-image">
        <img src="assets/cup.png" alt="Tea Cup" id="cup-img" class="section-image">
    </section>

    <section id="nation-section">
        <div class="content-layer">
            <h1>AROUND THE NATION</h1>
        </div>
    </section>

    <section id="camera-section">
        <div class="content-layer">
            <h1>CAMERA</h1>
        </div>
    </section>

</div>

<script>
    const numParticles = 120;
    let particles = [];
    let emitterX = 0;
    let emitterY = 0;

    // Compute emitter position relative to the section (= canvas origin)
    function computeEmitter() {
        const section = document.getElementById('chai-section');
        const lighter = document.getElementById('lighter-img');
        const sRect   = section.getBoundingClientRect();
        const lRect   = lighter.getBoundingClientRect();
        emitterX = (lRect.left - sRect.left) + lRect.width * 0.33;
        emitterY = (lRect.top  - sRect.top);
    }

    function setup() {
        const section = document.getElementById('chai-section');

        // FIX 1: size canvas to match the section, and parent it inside the section
        // The section has overflow:hidden so the canvas is visually clipped to section 1 only
        let canvas = createCanvas(section.offsetWidth, section.offsetHeight);
        canvas.id('smoke-canvas');
        canvas.parent('chai-section');

        background(230, 223, 208);

        // FIX 2: compute emitter before creating any particles so they spawn at the
        // correct position from frame 1 — no click/interaction needed
        computeEmitter();

        for (let i = 0; i < numParticles; i++) {
            const p = new Particle();
            p.reset(emitterX, emitterY);
            // Stagger starting lifespans so trails are already spread on load
            p.lifespan = random(0, 400);
            particles.push(p);
        }
    }

    function draw() {
        background(230, 223, 208, 5);

        // Re-compute each frame — cheap and keeps emitter correct after any resize/reflow
        computeEmitter();

        particles.forEach(p => {
            p.update();
            p.display(emitterX, emitterY);
        });
    }

    function windowResized() {
        const section = document.getElementById('chai-section');
        resizeCanvas(section.offsetWidth, section.offsetHeight);
        computeEmitter();
    }

    class Particle {
        constructor() {
            this.pos      = createVector(0, 0);
            this.prevPos  = this.pos.copy();
            this.lifespan = random(200, 350);
        }

        reset(x, y) {
            this.pos      = createVector(x, y);
            this.prevPos  = this.pos.copy();
            this.speed    = random(1.5, 3);
            this.lifespan = random(250, 400);
        }

        update() {
            let noiseVal = noise(this.pos.x * 0.003, this.pos.y * 0.003, frameCount * 0.003);
            let angle    = map(noiseVal, 0, 1, -PI, PI / 2);

            this.prevPos = this.pos.copy();
            this.pos.x  += cos(angle) * this.speed;
            this.pos.y  += sin(angle) * this.speed;

            this.lifespan -= 0.5;
        }

        display(ex, ey) {
            if (this.lifespan < 0 || this.pos.x > width || this.pos.y < 0 || this.pos.x < 0) {
                this.reset(ex, ey);
            }
            stroke(186, 10, 10, map(this.lifespan, 0, 400, 0, 120));
            strokeWeight(1);
            line(this.pos.x, this.pos.y, this.prevPos.x, this.prevPos.y);
        }
    }
</script>
</body>
</html>
