<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Moeed Turns 20</title>
    <link href="https://fonts.googleapis.com/css2?family=Anton&family=Caveat&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.0/p5.js"></script>
    <style>
        :root {
            --bg-color: #e6dfd0;
            --accent-red: #ba0a0a;
            --header-font: 'Anton', sans-serif;
            --script-font: 'Caveat', cursive;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; -webkit-user-select: none; }
        body { background-color: var(--bg-color); -webkit-overflow-scrolling: touch; cursor: none; }

        /* ── Custom Cursor ── */
        #custom-cursor {
            position: fixed;
            width: 28px;
            height: 28px;
            border-radius: 50%;
            pointer-events: none;
            z-index: 99999;
            mix-blend-mode: difference;
            background: #ffffff;
            transform: translate(-50%, -50%);
            transition: transform 0.12s cubic-bezier(0.22, 1, 0.36, 1),
                        width 0.18s cubic-bezier(0.22, 1, 0.36, 1),
                        height 0.18s cubic-bezier(0.22, 1, 0.36, 1);
            will-change: transform, width, height;
            top: 0;
            left: 0;
        }
        #custom-cursor.enlarged {
            width: 52px;
            height: 52px;
        }

        .main-container {
            height: 100vh;
            overflow-y: scroll;
            scroll-snap-type: y mandatory;
            scroll-behavior: smooth;
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
        .main-container::-webkit-scrollbar { display: none; }

        section {
            height: 100vh;
            width: 100%;
            scroll-snap-align: start;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            background-color: var(--bg-color);
        }

        #smoke-canvas {
            position: absolute;
            top: 0; left: 0;
            z-index: 0;
            pointer-events: none;
        }

        .content-layer {
            z-index: 10;
            text-align: center;
            pointer-events: none;
            user-select: none;
            position: absolute;
            top: 35%;
            left: 50%;
            transform: translateX(-50%);
            width: 90%;
        }

        h1 {
            font-family: var(--header-font);
            font-size: 10vw;
            color: var(--accent-red);
            text-transform: uppercase;
            line-height: 0.9;
            letter-spacing: 2px;
        }

        .subtitle {
            font-family: var(--script-font);
            font-size: 4vw;
            color: var(--accent-red);
            margin-top: 15px;
        }

        .section-image {
            position: absolute;
            bottom: 0;
            z-index: 1;
            width: auto;
        }

        #lighter-img { left: 2%; max-height: 60vh; }

        @keyframes floatAndRotate {
            0%       { transform: translate(0px,  0px) rotate(0deg);   }
            25%      { transform: translate(5px,  5px) rotate(90deg);  }
            50%      { transform: translate(0px, -5px) rotate(180deg); }
            75%      { transform: translate(-5px, 5px) rotate(270deg); }
            100%     { transform: translate(0px,  0px) rotate(360deg);   }
        }

        #cup-img {
            right: 3%; max-height: 45vh; z-index: 5; top: 3%;
            animation: floatAndRotate 10s linear infinite;
            transform-origin: center;
        }

        /* ── Section 1 Photos ── */
        @keyframes floatA {
            0%, 100% { transform: translateY(0px)  rotate(var(--rot)); }
            50%      { transform: translateY(-8px) rotate(var(--rot)); }
        }
        @keyframes floatB {
            0%, 100% { transform: translateY(0px)  rotate(var(--rot)); }
            50%      { transform: translateY(-6px) rotate(var(--rot)); }
        }

        .chai-pola {
            position: absolute;
            z-index: 12;
            box-sizing: border-box;
            transition: transform 0.18s cubic-bezier(0.22, 1, 0.36, 1);
        }
        .chai-pola img {
            display: block;
            width: 100%;
            height: auto;
            border-radius: 2px;
        }

        /* Hover scale for section 1 personal photos */
        .chai-pola:hover {
            transform: rotate(var(--rot)) scale(1.13) !important;
            animation-play-state: paused !important;
            z-index: 50;
        }

        /* ── Section 2 slap photos ── */
        @keyframes slapIn {
            0%   { transform: scale(2.2) rotate(var(--rot)); opacity: 0; }
            60%  { transform: scale(0.92) rotate(var(--rot)); opacity: 1; }
            80%  { transform: scale(1.04) rotate(var(--rot)); opacity: 1; }
            100% { transform: scale(1)    rotate(var(--rot)); opacity: 1; }
        }
        .nation-photo {
            position: absolute;
            z-index: 20;
            opacity: 0;
            pointer-events: none;
            transition: transform 0.18s cubic-bezier(0.22, 1, 0.36, 1);
        }
        .nation-photo img {
            display: block;
            width: 100%;
            height: auto;
            border-radius: 2px;
        }
        .nation-photo.slapped {
            animation: slapIn 0.35s cubic-bezier(0.22, 1, 0.36, 1) forwards;
        }
        /* Hover scale for section 2 personal photos */
        .nation-photo.slapped:hover,
        .nation-photo[style*="pointer-events: auto"]:hover {
            transform: scale(1.13) rotate(var(--rot)) !important;
            z-index: 50;
        }

        #nation-section .content-layer {
            top: 5vh;
            bottom: auto;
        }

        .car-image {
            position: absolute;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            z-index: 3;
            max-height: 28vh;
            width: auto;
        }

        #nation-stripe {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 2;
            pointer-events: none;
        }

        /* ── Camera Section ── */
        #camera-section { overflow: hidden; }

        #camera-img {
            left: 0;
            max-height: 85vh;
            z-index: 5;
            bottom: 0;
        }

        #photo-strip {
            position: absolute;
            left: 0;
            width: 100%;
            z-index: 3;
            pointer-events: none;
            overflow: visible;
        }

        #photo-clip {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            pointer-events: none;
        }

        .sliding-photo {
            position: absolute;
            height: 100%;
            width: auto;
            aspect-ratio: 4/3;
            object-fit: cover;
            border-radius: 1px;
            will-change: transform, opacity;
        }

        #camera-section .content-layer {
            top: 8vh;
            left: 50%;
            transform: translateX(-50%);
        }

        #camera-caption {
            position: absolute;
            bottom: 5vh;
            left: 50%;
            transform: translateX(-50%);
            z-index: 10;
            font-family: var(--script-font);
            font-size: 1.5vw;
            color: var(--accent-red);
            text-align: center;
            white-space: nowrap;
            pointer-events: none;
        }

        @media (max-width: 768px) {
            h1 { font-size: 18vw; }
            .subtitle { font-size: 8vw; }
            #lighter-img { max-height: 40vh; left: -10%; }
            #cup-img { max-height: 50vh; right: -10%; animation: none; }
            .car-image { max-height: 30vh; }
            #small-car { width: 55px; }
            #camera-img { max-height: 60vh; }
            #custom-cursor { display: none; }
        }
    </style>
</head>
<body>

<!-- Custom Cursor -->
<div id="custom-cursor"></div>

<div class="main-container">

    <section id="chai-section">
        <div class="content-layer">
            <h1>CHAI.CHACHA.CHILL</h1>
            <p class="subtitle">moeed turns 20</p>
        </div>
        <img src="assets/lighter.png" alt="Lighter" id="lighter-img" class="section-image">
        <img src="assets/cup.png"     alt="Tea Cup" id="cup-img"     class="section-image">

        <!-- Photo 1 -->
        <div class="chai-pola" id="chai-pola-1" style="--rot: -8deg;">
            <img src="assets/pola_1_1.jpeg" alt="memory 1">
        </div>
        <!-- Photo 2 -->
        <div class="chai-pola" id="chai-pola-2" style="--rot: 7deg;">

        </div>
    </section>

    <section id="nation-section">

        </div>

        <div class="nation-photo" id="nation-photo-1" style="--rot: -6deg;">

        </div>
        <div class="nation-photo" id="nation-photo-2" style="--rot: 4deg;">
            <img src="assets/pola_2_2.jpeg" alt="">
        </div>
        <div class="nation-photo" id="nation-photo-3" style="--rot: -3deg;">
            <img src="assets/pola_2_3.jpeg" alt="">
        </div>
    </section>

    <section id="camera-section">
        <div class="content-layer">
            <h1>MEMORIES</h1>
        </div>

        <p id="camera-caption">Happy birthday bro, may you live well and happy. <br> Nayab.Tasneem.Nadeer <br> <b>2026</b></p>

        <div id="photo-strip">
            <div id="photo-clip"></div>
        </div>

        <img src="assets/camera.png" alt="Camera" id="camera-img" class="section-image">
    </section>

</div>

<script>
/* ══════════════════════════════════════════════
   Custom Cursor
══════════════════════════════════════════════ */
(function() {
    const cursor = document.getElementById('custom-cursor');
    let mouseX = -100, mouseY = -100;

    document.addEventListener('mousemove', e => {
        mouseX = e.clientX;
        mouseY = e.clientY;
        cursor.style.left = mouseX + 'px';
        cursor.style.top  = mouseY + 'px';
    });

    document.addEventListener('mouseleave', () => {
        cursor.style.left = '-100px';
        cursor.style.top  = '-100px';
    });

    // Enlarge cursor when hovering personal photos
    const photoSelectors = '.chai-pola, .nation-photo';

    function attachCursorHover(el) {
        el.addEventListener('mouseenter', () => cursor.classList.add('enlarged'));
        el.addEventListener('mouseleave', () => cursor.classList.remove('enlarged'));
    }

    // Attach to existing elements
    document.querySelectorAll('.chai-pola').forEach(attachCursorHover);
    document.querySelectorAll('.nation-photo').forEach(attachCursorHover);

    // Expose for dynamically added elements
    window.attachCursorHoverToEl = attachCursorHover;
})();

/* ══════════════════════════════════════════════
   Section 1 Polaroids – size, position, animate
══════════════════════════════════════════════ */
function initChaiPolaroids() {
    const section = document.getElementById('chai-section');
    const sW = section.offsetWidth;
    const sH = section.offsetHeight;

    const cardW = Math.round(sW * 0.09);

    const configs = [
        {
            id:   'chai-pola-1',
            left: Math.round(sW * 0.37),
            top:  Math.round(sH * 0.05),
            rot:  '-8deg',
            anim: 'floatA 5.2s ease-in-out infinite',
        },
        {
            id:   'chai-pola-2',
            left: Math.round(sW * 0.55),
            top:  Math.round(sH * 0.68),
            rot:  '7deg',
            anim: 'floatB 4.8s ease-in-out infinite',
        },
    ];

    configs.forEach(cfg => {
        const card = document.getElementById(cfg.id);
        if (!card) return;
        card.style.cssText += `
            width: ${cardW}px;
            left: ${cfg.left}px;
            top:  ${cfg.top}px;
            --rot: ${cfg.rot};
            transform: rotate(${cfg.rot});
            animation: ${cfg.anim};
            transform-origin: center center;
            cursor: none;
            transition: opacity 0.3s ease, transform 0.18s cubic-bezier(0.22, 1, 0.36, 1);
        `;

        card.addEventListener('click', () => {
            const rect = card.getBoundingClientRect();
            burstConfetti(rect.left + rect.width / 2, rect.top + rect.height / 2);
            card.style.opacity = '0';
            card.style.pointerEvents = 'none';
        });
    });
}

/* ── Red-only confetti ── */
function burstConfetti(originX, originY) {
    const REDS = ['#ba0a0a','#d41010','#8b0000','#e63030','#6e0000','#c22020'];
    const COUNT = 60;
    const canvas = document.createElement('canvas');
    canvas.style.cssText = `
        position: fixed; top: 0; left: 0;
        width: 100%; height: 100%;
        pointer-events: none;
        z-index: 9999;
    `;
    canvas.width  = window.innerWidth;
    canvas.height = window.innerHeight;
    document.body.appendChild(canvas);
    const ctx = canvas.getContext('2d');

    const pieces = Array.from({ length: COUNT }, () => ({
        x:    originX,
        y:    originY,
        vx:   (Math.random() - 0.5) * 14,
        vy:   (Math.random() - 0.9) * 12,
        rot:  Math.random() * Math.PI * 2,
        rvel: (Math.random() - 0.5) * 0.25,
        w:    4 + Math.random() * 6,
        h:    8 + Math.random() * 10,
        color: REDS[Math.floor(Math.random() * REDS.length)],
        alpha: 1,
    }));

    let startTS = null;
    const DURATION = 1800;

    function draw(ts) {
        if (!startTS) startTS = ts;
        const elapsed = ts - startTS;
        const progress = elapsed / DURATION;

        ctx.clearRect(0, 0, canvas.width, canvas.height);

        let alive = false;
        pieces.forEach(p => {
            p.x   += p.vx;
            p.y   += p.vy;
            p.vy  += 0.4;
            p.vx  *= 0.98;
            p.rot += p.rvel;
            p.alpha = Math.max(0, 1 - progress * 1.3);

            if (p.alpha <= 0) return;
            alive = true;

            ctx.save();
            ctx.globalAlpha = p.alpha;
            ctx.translate(p.x, p.y);
            ctx.rotate(p.rot);
            ctx.fillStyle = p.color;
            ctx.fillRect(-p.w / 2, -p.h / 2, p.w, p.h);
            ctx.restore();
        });

        if (alive && elapsed < DURATION) {
            requestAnimationFrame(draw);
        } else {
            canvas.remove();
        }
    }

    requestAnimationFrame(draw);
}

window.addEventListener('load', initChaiPolaroids);

/* ══════════════════════════════════════════════
   Section 1: Smoke (p5.js)
══════════════════════════════════════════════ */
const numParticles = 120;
let particles = [];
let emitterX = 0, emitterY = 0;

function computeEmitter() {
    const section = document.getElementById('chai-section');
    const lighter = document.getElementById('lighter-img');
    if(!section || !lighter) return;
    const sRect   = section.getBoundingClientRect();
    const lRect   = lighter.getBoundingClientRect();
    emitterX = (lRect.left - sRect.left) + lRect.width * 0.33;
    emitterY = (lRect.top  - sRect.top);
}

function setup() {
    const section = document.getElementById('chai-section');
    let canvas = createCanvas(section.offsetWidth, section.offsetHeight);
    canvas.id('smoke-canvas');
    canvas.parent('chai-section');
    background(230, 223, 208);
    computeEmitter();
    for (let i = 0; i < numParticles; i++) {
        const p = new Particle();
        p.reset(emitterX, emitterY);
        p.lifespan = random(0, 400);
        particles.push(p);
    }
}

function draw() {
    background(230, 223, 208, 5);
    computeEmitter();
    particles.forEach(p => { p.update(); p.display(emitterX, emitterY); });
}

function windowResized() {
    const section = document.getElementById('chai-section');
    resizeCanvas(section.offsetWidth, section.offsetHeight);
    computeEmitter();
    if (stripeAnimated) {
        stripeAnimated = false;
        buildNationStripe();
        animateNationStripe();
    }
    positionPhotoStrip();
}

class Particle {
    constructor() {
        this.pos = createVector(0, 0);
        this.prevPos = this.pos.copy();
        this.lifespan = random(200, 350);
    }
    reset(x, y) {
        this.pos = createVector(x, y);
        this.prevPos = this.pos.copy();
        this.speed = random(1.5, 3);
        this.lifespan = random(250, 400);
    }
    update() {
        const noiseVal = noise(this.pos.x * 0.003, this.pos.y * 0.003, frameCount * 0.003);
        const angle    = map(noiseVal, 0, 1, -PI, PI / 2);
        this.prevPos   = this.pos.copy();
        this.pos.x    += cos(angle) * this.speed;
        this.pos.y    += sin(angle) * this.speed;
        this.lifespan -= 0.5;
    }
    display(ex, ey) {
        if (this.lifespan < 0 || this.pos.x > width || this.pos.y < 0 || this.pos.x < 0) {
            this.reset(ex, ey);
        }
        stroke(186, 10, 10, map(this.lifespan, 0, 400, 0, 120));
        strokeWeight(1);
        line(this.pos.x, this.pos.y, this.prevPos.x, this.prevPos.y);
    }
}

/* ══════════════════════════════════════════════
   Section 2: Nation Stripe + Car
══════════════════════════════════════════════ */
let stripeAnimated = false;
let stripeGeometry = null;

function buildNationStripe() {
    const section = document.getElementById('nation-section');
    const svg     = document.getElementById('nation-stripe');
    const W = section.offsetWidth;
    const H = section.offsetHeight;

    const yMin = H * 0.30;
    const yMax = H * 0.65;

    const y1 = yMin + Math.random() * (yMax - yMin);
    const y2 = yMin + Math.random() * (yMax - yMin);

    const extra = 40;
    const x1 = -extra;
    const x2 = W + extra;
    const slope = (y2 - y1) / W;
    const ey1   = y1 - slope * extra;
    const ey2   = y2 + slope * extra;

    const rad = Math.atan2(y2 - y1, W);

    const thick = 14, gap = 6, thin = 5;
    const perpX = -Math.sin(rad);
    const perpY =  Math.cos(rad);
    const po    = thick / 2 + gap + thin / 2;
    const tx1 = x1 + perpX * po, ty1 = ey1 + perpY * po;
    const tx2 = x2 + perpX * po, ty2 = ey2 + perpY * po;

    const lineLen = Math.hypot(x2 - x1, ey2 - ey1);

    stripeGeometry = { x1: 0, y1, x2: W, y2, rad, W, ty1, ty2 };

    svg.setAttribute('viewBox', `0 0 ${W} ${H}`);
    svg.innerHTML = `
        <line id="stripe-thick"
              x1="${x1}"  y1="${ey1}" x2="${x2}"  y2="${ey2}"
              stroke="#ba0a0a" stroke-width="${thick}" stroke-linecap="butt"
              stroke-dasharray="${lineLen}" stroke-dashoffset="${lineLen}"/>
        <line id="stripe-thin"
              x1="${tx1}" y1="${ty1}" x2="${tx2}" y2="${ty2}"
              stroke="#ba0a0a" stroke-width="${thin}"  stroke-linecap="butt"
              stroke-dasharray="${lineLen}" stroke-dashoffset="${lineLen}"/>
    `;
}

function animateSmallCar() {
    if (!stripeGeometry) return;
    const { x1, y1, x2, y2, rad, W, ty1, ty2 } = stripeGeometry;

    const car = document.createElement('img');
    car.src = 'assets/small_car.png';
    car.id = 'small-car';
    car.style.cssText = `
        position: absolute;
        width: 90px;
        height: auto;
        opacity: 0;
        pointer-events: none;
        transform-origin: center center;
        will-change: transform;
        z-index: 4;
    `;
    document.getElementById('nation-section').appendChild(car);

    function runAnim() {
        car.style.position = 'absolute';
        car.style.left = '0';
        car.style.top = '0';

        const carW = car.offsetWidth  || 80;
        const carH = car.offsetHeight || 50;

        const startX   = -carW;
        const endX     = W + carW;
        const duration = 4000;
        let   startTS  = null;
        let   midFired = false;

        car.style.opacity = '1';

        function step(ts) {
            if (!startTS) startTS = ts;
            const progress = Math.min((ts - startTS) / duration, 1);
            const currentX = startX + (endX - startX) * progress;

            const t      = (currentX - x1) / (x2 - x1);
            const thickY = y1 + t * (y2 - y1);
            const thinY  = ty1 + t * (ty2 - ty1);
            const lineY  = (thickY + thinY) / 2;

            const angleDeg = rad * 180 / Math.PI;

            car.style.transform =
                `translate(${currentX - carW / 2}px, ${lineY - carH / 2}px) rotate(${angleDeg}deg)`;

            if (!midFired && progress >= 0.5) {
                midFired = true;
                slapNationPhotos();
            }

            if (progress < 1) requestAnimationFrame(step);
            else car.style.opacity = '0';
        }

        requestAnimationFrame(step);
    }

    if (car.complete && car.naturalWidth) {
        runAnim();
    } else {
        car.addEventListener('load', runAnim, { once: true });
    }
}

/* ── Section 2: slap three photos in with stagger ── */
function slapNationPhotos() {
    const section = document.getElementById('nation-section');
    const sW = section.offsetWidth;
    const sH = section.offsetHeight;

    const imgW = Math.round(sW * 0.09);

    const carTopApprox = sH * 0.70;
    const imgH         = imgW * 1.3;

    const safeBottom = carTopApprox - imgH - 10;

    const configs = [
        { id: 'nation-photo-1', left: Math.round(sW * 0.18), top: Math.round(Math.min(sH * 0.18, safeBottom)),  rot: '-6deg',  delay: 0   },
        { id: 'nation-photo-2', left: Math.round(sW * 0.34), top: Math.round(Math.min(sH * 0.52, safeBottom)),  rot: '4deg',   delay: 120 },
        { id: 'nation-photo-3', left: Math.round(sW * 0.70), top: Math.round(Math.min(sH * 0.20, safeBottom)),  rot: '-3deg',  delay: 240 },
    ];

    configs.forEach(cfg => {
        const el  = document.getElementById(cfg.id);
        if (!el) return;
        el.style.cssText += `
            width: ${imgW}px;
            left: ${cfg.left}px;
            top:  ${cfg.top}px;
            --rot: ${cfg.rot};
            transform-origin: center center;
            cursor: none;
        `;
        const img = el.querySelector('img');
        if (img) img.style.width = imgW + 'px';

        setTimeout(() => {
            el.classList.add('slapped');
            el.style.pointerEvents = 'auto';
            // attach cursor enlargement after it becomes interactive
            if (window.attachCursorHoverToEl) window.attachCursorHoverToEl(el);
        }, cfg.delay);

        el.addEventListener('click', () => {
            const rect = el.getBoundingClientRect();
            burstConfetti(rect.left + rect.width / 2, rect.top + rect.height / 2);
            el.style.setProperty('opacity', '0', 'important');
            el.style.pointerEvents = 'none';
            // remove enlarged class in case mouse is still over
            document.getElementById('custom-cursor').classList.remove('enlarged');
        });
    });
}

function animateNationStripe() {
    if (stripeAnimated) return;
    stripeAnimated = true;

    const thick = document.getElementById('stripe-thick');
    const thin  = document.getElementById('stripe-thin');
    if (!thick || !thin) return;

    const len      = parseFloat(thick.getAttribute('stroke-dasharray'));
    const duration = 300;
    let   start    = null;

    thick.style.strokeDashoffset = -len;
    thin.style.strokeDashoffset  = -len;

    function step(ts) {
        if (!start) start = ts;
        const t      = Math.min((ts - start) / duration, 1);
        const ease   = t;
        const offset = -len * (1 - ease);
        thick.style.strokeDashoffset = offset;
        thin.style.strokeDashoffset  = offset;
        if (t < 1) requestAnimationFrame(step);
        else animateSmallCar();
    }
    requestAnimationFrame(step);
}

window.addEventListener('load', () => {
    const observer = new IntersectionObserver((entries) => {
        entries.forEach(entry => {
            if (entry.isIntersecting) {
                buildNationStripe();
                animateNationStripe();
                observer.disconnect();
            }
        });
    }, { threshold: 0.99 });

    observer.observe(document.getElementById('nation-section'));
});

/* ══════════════════════════════════════════════
   Section 3: Camera – Photos loop forever
══════════════════════════════════════════════ */

const PHOTO_COUNT = 6;
const PHOTO_EXT   = 'jpeg';

function positionPhotoStrip() {
    const section = document.getElementById('camera-section');
    const camImg  = document.getElementById('camera-img');
    const strip   = document.getElementById('photo-strip');
    const clip    = document.getElementById('photo-clip');
    if (!camImg.complete || !camImg.naturalHeight) return null;

    const sH   = section.offsetHeight;
    const camH = camImg.offsetHeight;
    const camW = camImg.offsetWidth;

    const lensBottomFromBottom = camH * 0.49;
    const lensTopFromBottom    = camH * 0.83;

    const lensTop    = sH - lensTopFromBottom;
    const lensBottom = sH - lensBottomFromBottom;
    const lensHeight = lensBottom - lensTop;

    strip.style.position = 'absolute';
    strip.style.top      = '0';
    strip.style.left     = '0';
    strip.style.width    = '100%';
    strip.style.height   = '100%';
    strip.style.overflow = 'hidden';

    clip.style.position = 'absolute';
    clip.style.top      = lensTop + 'px';
    clip.style.left     = camW + 'px';
    clip.style.width    = (section.offsetWidth - camW) + 'px';
    clip.style.height   = lensHeight + 'px';
    clip.style.overflow = 'hidden';

    return { lensTop, lensHeight, camW };
}

let cameraPhotosStarted = false;

function startCameraPhotos() {
    if (cameraPhotosStarted) return;
    cameraPhotosStarted = true;

    const camImg = document.getElementById('camera-img');

    function init() {
        const info = positionPhotoStrip();
        if (!info) return;

        const section = document.getElementById('camera-section');
        const clip    = document.getElementById('photo-clip');
        const sW      = section.offsetWidth;
        const { lensHeight, camW } = info;

        const GAP           = 24;
        const SPEED         = 0.12;
        const BORDER_SIDE   = Math.round(lensHeight * 0.05);
        const BORDER_BOTTOM = Math.round(lensHeight * 0.18);
        const INNER_H       = lensHeight - BORDER_SIDE * 2;
        const clipW         = sW - camW;
        const endX          = clipW + lensHeight * 3;

        const naturalSizes = new Array(PHOTO_COUNT).fill(null);
        let loadedCount = 0;

        function onAllLoaded() {
            const cardWidths = naturalSizes.map(({ w, h }) => {
                const imgW = (w && h) ? Math.round((w / h) * INNER_H) : Math.round(INNER_H * 4 / 3);
                return imgW + BORDER_SIDE * 2;
            });

            function launchCard(photoIndex) {
                const cardW = cardWidths[photoIndex];
                const sx    = -cardW;

                const card = document.createElement('div');
                card.style.cssText = `
                    position: absolute;
                    top: 0; left: 0;
                    height: ${lensHeight}px;
                    width: ${cardW}px;
                    display: inline-flex;
                    flex-direction: column;
                    padding: ${BORDER_SIDE}px ${BORDER_SIDE}px ${BORDER_BOTTOM}px ${BORDER_SIDE}px;
                    background: #ba0a0a;
                    box-sizing: border-box;
                    transform: translateX(${sx}px);
                `;

                const img = document.createElement('img');
                img.src = `assets/photo${photoIndex + 1}.${PHOTO_EXT}`;
                img.style.cssText = `
                    display: block;
                    height: ${INNER_H}px;
                    width: auto;
                    flex-shrink: 0;
                `;
                card.appendChild(img);
                clip.appendChild(card);

                const nextIndex = (photoIndex + 1) % PHOTO_COUNT;
                const delayToNext = (cardW + GAP) / SPEED;
                setTimeout(() => launchCard(nextIndex), delayToNext);

                const fadeZone = Math.max(cardW * 1.5, 80);
                let startTS = null;

                function step(ts) {
                    if (!startTS) startTS = ts;
                    const x = sx + (ts - startTS) * SPEED;
                    card.style.transform = `translateX(${x}px)`;

                    const fadeStart = clipW - fadeZone;
                    if (x > fadeStart) {
                        const fadeT = Math.min((x - fadeStart) / fadeZone, 1);
                        card.style.opacity = String(1 - fadeT);
                    }

                    if (x < endX) requestAnimationFrame(step);
                    else card.remove();
                }

                requestAnimationFrame(step);
            }

            launchCard(0);
        }

        for (let i = 0; i < PHOTO_COUNT; i++) {
            (function(idx) {
                const tmp = new Image();
                function done() {
                    naturalSizes[idx] = { w: tmp.naturalWidth, h: tmp.naturalHeight };
                    if (++loadedCount === PHOTO_COUNT) onAllLoaded();
                }
                tmp.onload  = done;
                tmp.onerror = done;
                tmp.src = `assets/photo${idx + 1}.${PHOTO_EXT}`;
            })(i);
        }
    }

    if (camImg.complete && camImg.naturalHeight) {
        init();
    } else {
        camImg.addEventListener('load', init, { once: true });
    }
}

window.addEventListener('load', () => {
    const camImg = document.getElementById('camera-img');
    if (camImg.complete) positionPhotoStrip();
    else camImg.addEventListener('load', positionPhotoStrip, { once: true });

    const camObserver = new IntersectionObserver((entries) => {
        entries.forEach(entry => {
            if (entry.isIntersecting) {
                startCameraPhotos();
                camObserver.disconnect();
            }
        });
    }, { threshold: 0.5 });

    camObserver.observe(document.getElementById('camera-section'));
});
</script>
